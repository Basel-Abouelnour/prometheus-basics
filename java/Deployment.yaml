apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-prometheus
spec:
  replicas: 1

  selector:
    matchLabels:
      app: spring-prometheus

  template:
    metadata:
      labels:
        app: spring-prometheus

    spec:
      containers:
      - name: app

        image: haytham1992/spring-prometheus-demo:v1

        ports:
        - containerPort: 6666

---
apiVersion: v1
kind: Service
metadata:
  name: spring-prometheus

spec:
  selector:
    app: spring-prometheus

  ports:
  - port: 6666
    targetPort: 6666

  type: ClusterIP
