services:
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    env_file:
      - aws_credentials.env
    # this is needed for the EC2 service discovery to work
    # not a best practice to have the AWS credentials in the container, but for testing purposes it is fine
    ports:
      - "9090:9090"
    depends_on:
    - cadvisor
 
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
 
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
    - 8080:8080
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    depends_on:
    - redis
  
  redis:
    image: redis:latest
    container_name: redis
    ports:
    - 6379:6379
  
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    # The actual Linux root filesystem is mounted under /host, not /
    # Without this option, Node Exporter would collect metrics about the container itself instead of the host.
    
    network_mode: host
    # Shares the host network namespace.
    # No port mapping needed.
    # More accurate network metrics.
    # Simpler Prometheus configuration.


    pid: host
    # Shares the host PID namespace.
    # Allows the container to see host processes
    # Without it, Node Exporter only sees processes running inside the container.
    
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'
    # mounts the host filesystem as read-only, allowing Node Exporter to access system metrics and information from the host machine.
    # Without rslave, Node Exporter may not immediately see the new mount.
    # With rslave, the mount event propagates into the container.
    # This is important for filesystem collectors.

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data: